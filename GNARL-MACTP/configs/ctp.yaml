algorithm: ctp
seed: 1
train_data:
  graph_generator: er
  graph_generator_kwargs:
    p_range: [0.1, 0.2]
  node_samples:
    10: 10000
    13: 10000
    16: 10000
  num_envs: 4
  seed: 18
  graph_dir: graph_data
val_data:
  graph_generator: er
  graph_generator_kwargs:
    p_range: [0.1, 0.2]
  node_samples:
    20: 100
  deterministic: true
  num_envs: 4
  seed: 32
  graph_dir: graph_data
test_data:
  graph_generator: er
  graph_generator_kwargs:
    p_range: [0.1, 0.2]
  node_samples:
    16: 100
    32: 100
    64: 100
    128: 100
    256: 100
    512: 100
    1024: 100
  deterministic: true
  num_envs: 4
  seed: 47
  graph_dir: graph_data
policy_kwargs:
  embed_dim: 64
  pooling_type: max
  network_kwargs:
    network: MPNN
    aggr: max
    num_layers: 2
PPO:
  n_steps: 1024
  n_epochs: 10
  gamma: 1
  learning_rate: 0.0005
  timesteps: 500000
  batch_size: 32
  seed: 8
  eval_freq: 1024
weights_init:
  gnn_init: sparse
  encoder_init: ibarz2022
